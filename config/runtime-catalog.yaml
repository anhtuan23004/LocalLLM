version: 1
network: llm-net

formats:
  safetensors:
    compatible_runtimes: [vllm, sglang, mlx]
  pytorch:
    compatible_runtimes: [vllm, sglang, mlx]
  gguf:
    compatible_runtimes: [llama.cpp, ollama]

services:
  ollama:
    label: Ollama
    group: serving
    dir: serving/ollama
    compose_file: serving/ollama/docker-compose.yml
    container: ollama
    image:
      repository: ollama/ollama
      tag_env: OLLAMA_IMAGE_TAG
      default_tag: 0.24.0
    host_port:
      env: HOST_PORT
      default: 18134
    container_port: 11434
    gpu:
      enabled: true
      all_gpus: true
    model:
      litellm_model_env: OLLAMA_LITELLM_MODEL
    eval_endpoint: http://ollama:11434
    gateway_alias: local-ollama
    runtime_check:
      required: true
      host_endpoint: http://localhost:{host_port}/api/tags
      healthy_states: [healthy]
    status: true

  vllm:
    label: vLLM
    group: serving
    dir: serving/vllm
    compose_file: serving/vllm/docker-compose.yml
    container: vllm
    image:
      repository: vllm/vllm-openai
      tag_env: VLLM_IMAGE_TAG
      default_tag: v0.6.6.post1
    host_port:
      env: HOST_PORT
      default: 18000
    container_port: 8000
    gpu:
      enabled: true
      all_gpus: false
    model:
      path_env: VLLM_MODEL_PATH
      select_env:
        VLLM_MODEL_PATH: /models/{name}
        VLLM_SERVED_MODEL_NAME: "{repo}"
      litellm_model_env: VLLM_LITELLM_MODEL
    eval_endpoint: http://vllm:8000
    gateway_alias: local-vllm
    runtime_check:
      required: true
      host_endpoint: http://localhost:{host_port}/health
      healthy_states: [healthy]
    status: true

  sglang:
    label: SGLang
    group: serving
    dir: serving/sglang
    compose_file: serving/sglang/docker-compose.yml
    container: sglang
    image:
      repository: lmsysorg/sglang
      tag_env: SGLANG_IMAGE_TAG
      default_tag: v0.5.12.post1
    host_port:
      env: HOST_PORT
      default: 18030
    container_port: 30000
    gpu:
      enabled: true
      all_gpus: false
    model:
      path_env: SGLANG_MODEL_PATH
      select_env:
        SGLANG_MODEL_PATH: /models/{name}
      litellm_model_env: SGLANG_LITELLM_MODEL
    eval_endpoint: http://sglang:30000
    gateway_alias: local-sglang
    runtime_check:
      required: false
      healthy_states: [healthy, running]
    status: true

  llama.cpp:
    label: llama.cpp
    group: serving
    dir: serving/llama.cpp
    compose_file: serving/llama.cpp/docker-compose.yml
    container: llama-cpp
    image:
      repository: ghcr.io/ggml-org/llama.cpp
      tag_env: LLAMA_CPP_IMAGE_TAG
      default_tag: server-cuda@sha256:213012cb085f3f9042179915b987e9d28617a91f3b4a6e37991ab7dbb0de1bf1
    host_port:
      env: HOST_PORT
      default: 18080
    container_port: 8080
    gpu:
      enabled: true
      all_gpus: false
    model:
      path_env: LLAMA_CPP_MODEL_PATH
      select_env:
        LLAMA_CPP_MODEL_PATH: /models/{name}
      litellm_model_env: LLAMA_CPP_LITELLM_MODEL
    eval_endpoint: http://llama-cpp:8080
    gateway_alias: local-llama-cpp
    runtime_check:
      required: false
      healthy_states: [healthy, running]
    status: true

  mlx:
    label: MLX-LM
    group: serving
    dir: serving/mlx
    host_process: serving/mlx/serve.sh
    container: null
    host_port:
      env: MLX_PORT
      default: 18081
    gpu:
      enabled: false
      all_gpus: false
    model:
      select_env:
        MLX_MODEL: "{path}"
      litellm_model_env: MLX_LITELLM_MODEL
    eval_endpoint: http://host.docker.internal:18081
    gateway_alias: local-mlx

  litellm:
    label: LiteLLM
    group: serving
    dir: serving/litellm
    compose_file: serving/litellm/docker-compose.yml
    container: litellm
    image:
      repository: docker.litellm.ai/berriai/litellm
      tag_env: LITELLM_IMAGE_TAG
      default_tag: v1.72.6-stable
    host_port:
      env: HOST_PORT
      default: 18040
    container_port: 4000
    gpu:
      enabled: false
      all_gpus: false
    eval_endpoint: http://litellm:4000
    runtime_check:
      required: false
      healthy_states: [healthy, running]
    status: true

  open-webui:
    label: Open WebUI
    group: clients
    dir: clients/open-webui
    compose_file: clients/open-webui/docker-compose.yml
    container: open-webui
    image:
      repository: ghcr.io/open-webui/open-webui
      tag_env: OPEN_WEBUI_IMAGE_TAG
      default_tag: v0.6.15
    host_port:
      env: HOST_PORT
      default: 18088
    container_port: 8080
    gpu:
      enabled: false
      all_gpus: false
    runtime_check:
      required: true
      host_endpoint: http://localhost:{host_port}/health
      healthy_states: [healthy, running]
    status: true

  ocr-extract:
    label: OCR Extract
    group: clients
    dir: clients/ocr-extract
    compose_file: clients/ocr-extract/docker-compose.yml
    container: ocr-extract
    image:
      repository: llm-local-ocr-extract
      tag_env: OCR_EXTRACT_IMAGE_TAG
      default_tag: 0.1.0
      local: true
    host_port:
      env: HOST_PORT
      default: 18092
    container_port: 8092
    gpu:
      enabled: false
      all_gpus: false
    runtime_check:
      required: false
      host_endpoint: http://localhost:{host_port}/health
      healthy_states: [healthy, running]

  unsloth:
    label: Unsloth
    group: training
    dir: training/unsloth
    compose_file: training/unsloth/docker-compose.yml
    container: unsloth
    image:
      repository: unsloth/unsloth
      tag_env: UNSLOTH_IMAGE_TAG
      default_tag: 2026.5.7-pt2.10.0-vllm-0.16.0-cu12.8-studio-release-v0.1.41-beta-2026-MAY-24
    host_ports:
      - env: JUPYTER_HOST_PORT
        default: 8888
        container: 8888
      - env: UNSLOTH_API_HOST_PORT
        default: 8001
        container: 8000
      - env: UNSLOTH_SSH_HOST_PORT
        default: 2222
        container: 22
    gpu:
      enabled: true
      all_gpus: true

  evaluation:
    label: Evaluation
    group: evaluation
    dir: evaluation
    compose_file: evaluation/docker-compose.yml
    container: evaluation
    gpu:
      enabled: false
      all_gpus: false

  lm-eval:
    label: lm-eval
    group: evaluation
    dir: evaluation
    compose_file: evaluation/docker-compose.yml
    container: lm-eval
    gpu:
      enabled: false
      all_gpus: false

  observation:
    label: Observation batch
    group: observation
    dir: observation
    compose_file: observation/docker-compose.yml
    container: observation
    gpu:
      enabled: false
      all_gpus: false

  prometheus:
    label: Prometheus
    group: observation
    dir: observation
    compose_file: observation/docker-compose.yml
    container: prometheus
    image:
      repository: prom/prometheus
      tag_env: PROMETHEUS_IMAGE_TAG
      default_tag: v3.11.0
    host_port:
      env: PROMETHEUS_HOST_PORT
      default: 9090
    container_port: 9090
    gpu:
      enabled: false
      all_gpus: false
    runtime_check:
      required: true
      host_endpoint: http://localhost:{host_port}/-/healthy
      healthy_states: [healthy, running]

  grafana:
    label: Grafana
    group: observation
    dir: observation
    compose_file: observation/docker-compose.yml
    container: grafana
    image:
      repository: grafana/grafana
      tag_env: GRAFANA_IMAGE_TAG
      default_tag: 12.0.2
    host_port:
      env: GRAFANA_HOST_PORT
      default: 3000
    container_port: 3000
    gpu:
      enabled: false
      all_gpus: false
    runtime_check:
      required: true
      host_endpoint: http://localhost:{host_port}/api/health
      healthy_states: [healthy, running]

  ollama-exporter:
    label: Ollama exporter
    group: observation
    dir: observation
    compose_file: observation/docker-compose.yml
    container: ollama-exporter
    gpu:
      enabled: false
      all_gpus: false

  nvidia-gpu-exporter:
    label: NVIDIA GPU exporter
    group: observation
    dir: observation
    compose_file: observation/docker-compose.yml
    container: nvidia-gpu-exporter
    image:
      repository: utkuozdemir/nvidia_gpu_exporter
      tag_env: GPU_EXPORTER_IMAGE_TAG
      default_tag: 1.2.1
    host_port:
      env: GPU_EXPORTER_HOST_PORT
      default: 9835
    container_port: 9835
    gpu:
      enabled: true
      all_gpus: false
