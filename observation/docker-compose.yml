services:
  # Existing batch observation (benchmark reports)
  observation:
    build: .
    container_name: observation
    profiles:
      - batch
    volumes:
      - ./scripts:/app/scripts
      - ./dashboards:/app/dashboards
      - ../evaluation/results:/app/results
    networks:
      - llm-net

  # Real-time stack
  prometheus:
    image: prom/prometheus:${PROMETHEUS_IMAGE_TAG:-v3.11.0}
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    networks:
      - llm-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:${GRAFANA_IMAGE_TAG:-12.0.2}
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "${GRAFANA_ANONYMOUS_ENABLED:-true}"
      GF_AUTH_ANONYMOUS_ORG_ROLE: ${GRAFANA_ANONYMOUS_ORG_ROLE:-Viewer}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    depends_on:
      - prometheus
    networks:
      - llm-net
    restart: unless-stopped


  ollama-exporter:
    build: .
    container_name: ollama-exporter
    entrypoint: ["python", "/app/scripts/ollama_exporter.py"]
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_EXPORTER_PORT: 9101
    volumes:
      - ./scripts:/app/scripts
    networks:
      - llm-net
    restart: unless-stopped

  nvidia-gpu-exporter:
    image: utkuozdemir/nvidia_gpu_exporter:${GPU_EXPORTER_IMAGE_TAG:-1.2.1}
    container_name: nvidia-gpu-exporter
    profiles:
      - gpu
    devices:
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia0:/dev/nvidia0
    volumes:
      - /usr/bin/nvidia-smi:/usr/bin/nvidia-smi:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:ro
    ports:
      - "${GPU_EXPORTER_HOST_PORT:-9835}:9835"
    networks:
      - llm-net
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:

networks:
  llm-net:
    external: true
