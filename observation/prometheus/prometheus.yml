global:
  scrape_interval: 15s

scrape_configs:
  - job_name: vllm
    metrics_path: /metrics
    static_configs:
      - targets: ["vllm:8000"]

  - job_name: sglang
    metrics_path: /metrics
    static_configs:
      - targets: ["sglang:30000"]

  - job_name: llama-cpp
    metrics_path: /metrics
    static_configs:
      - targets: ["llama-cpp:8080"]

  - job_name: ollama
    metrics_path: /metrics
    static_configs:
      - targets: ["ollama-exporter:9101"]

  - job_name: nvidia-gpu
    static_configs:
      - targets: ["nvidia-gpu-exporter:9835"]
