services:
  litellm:
    image: docker.litellm.ai/berriai/litellm:${LITELLM_IMAGE_TAG:-v1.72.6-stable}
    container_name: litellm
    command: ["--config", "/app/config.yaml", "--port", "${CONTAINER_PORT:-4000}"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local-litellm}
      OLLAMA_API_BASE: ${OLLAMA_API_BASE:-http://ollama:11434}
      OLLAMA_LITELLM_MODEL: ${OLLAMA_LITELLM_MODEL:-ollama_chat/llama3}
      VLLM_API_BASE: ${VLLM_API_BASE:-http://vllm:8000/v1}
      VLLM_API_KEY: ${VLLM_API_KEY:-sk-local-vllm}
      VLLM_LITELLM_MODEL: ${VLLM_LITELLM_MODEL:-openai/Qwen/Qwen3-VL-4B-Instruct}
      SGLANG_API_BASE: ${SGLANG_API_BASE:-http://sglang:30000/v1}
      SGLANG_API_KEY: ${SGLANG_API_KEY:-sk-local-sglang}
      SGLANG_LITELLM_MODEL: ${SGLANG_LITELLM_MODEL:-openai/GLM-OCR}
      LLAMA_CPP_API_BASE: ${LLAMA_CPP_API_BASE:-http://llama-cpp:8080/v1}
      LLAMA_CPP_API_KEY: ${LLAMA_CPP_API_KEY:-sk-local-llama-cpp}
      LLAMA_CPP_LITELLM_MODEL: ${LLAMA_CPP_LITELLM_MODEL:-openai/local-gguf}
      MLX_API_BASE: ${MLX_API_BASE:-http://host.docker.internal:18081/v1}
      MLX_API_KEY: ${MLX_API_KEY:-sk-local-mlx}
      MLX_LITELLM_MODEL: ${MLX_LITELLM_MODEL:-openai/local-mlx}
    ports:
      - "${HOST_PORT:-18040}:${CONTAINER_PORT:-4000}"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - llm-net
    restart: unless-stopped

networks:
  llm-net:
    external: true
