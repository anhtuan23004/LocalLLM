services:
  ollama:
    image: ollama/ollama:${OLLAMA_IMAGE_TAG:-0.24.0}
    container_name: ollama
    ports:
      - "${HOST_PORT:-18134}:${CONTAINER_PORT:-11434}"

    volumes:
      - ollama_data:/root/.ollama
    
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]
    networks:
      - llm-net    
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  ollama_data:
    driver: local
networks:
  llm-net:
    external: true
