services:
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:${LLAMA_CPP_IMAGE_TAG:-server-cuda}
    container_name: llama-cpp
    ports:
      - "${HOST_PORT:-18080}:${CONTAINER_PORT:-8080}"
    volumes:
      - ${MODEL_LOCAL_PATH:-../../models}:/models
    environment:
      LLAMA_ARG_MODEL: ${LLAMA_CPP_MODEL_PATH:-/models/model.gguf}
      LLAMA_ARG_MMPROJ: ${LLAMA_CPP_MMPROJ_PATH:-}
      LLAMA_ARG_CTX_SIZE: ${LLAMA_CPP_CTX_SIZE:-4096}
      LLAMA_ARG_N_PARALLEL: ${LLAMA_CPP_N_PARALLEL:-2}
      LLAMA_ARG_N_GPU_LAYERS: ${LLAMA_CPP_N_GPU_LAYERS:-99}
      LLAMA_ARG_ENDPOINT_METRICS: 1
      LLAMA_ARG_HOST: 0.0.0.0
      LLAMA_ARG_PORT: ${CONTAINER_PORT:-8080}
      LLAMA_ARG_ALIAS: local-gguf
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    networks:
      - llm-net

networks:
  llm-net:
    external: true
